title: "kdh-pipelines v2 구현"
phase: practical
module: 2
track: practical
duration: 60min+
objective: "M1 설계를 바탕으로 Claude Code에게 구현을 시키고, 결과를 판정한다"
note: "동희님은 코딩하지 않음. Claude Code가 구현. 동희님은 설계자+판정자."

process:
  1: "M1 설계서를 Claude Code에게 전달"
  2: "스킬 파일 생성 (SKILL.md frontmatter 표준 적용)"
  3: "에이전트 정의 생성 (frontmatter 16필드 표준 적용)"
  4: "훅 스크립트 생성 (가드/포맷/관측)"
  5: "CLAUDE.md 최적화 (/kdh-claude-md audit + optimize)"
  6: "동작 확인 + 요구사항 대비 판정"

quality_gates:
  - "CLAUDE.md 200줄 이내"
  - "스킬 frontmatter 표준 준수"
  - "Hook으로 강제 가능한 규칙은 Hook으로 구현"
  - "advisory 규칙은 CLAUDE.md에 유지"
  - "테스트 가능한 검증 수단 포함"

concepts:
  - pipeline-implementation
  - skill-authoring
  - agent-definition
  - hook-scripting

verdict: "v2 스킬/에이전트/훅이 설계서대로 동작하는지 판정 가능"
