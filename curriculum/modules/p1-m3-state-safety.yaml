title: "상태 + 안전 + 권한"
phase: 1
module: 3
track: basic
duration: 30min
objective: "에이전트의 작업 상태 관리, 폭주 방지, 인간 승인 포인트를 이해한다"

key_concepts:
  - 세션 관리 (Session Management)
  - 서킷브레이커 (Circuit Breaker)
  - 토큰 예산 (Token Budget)
  - 작업 큐 (Task Queue)
  - 동시성 제어 (Concurrency Control)
  - 인간 승인 포인트 (Human Approval Point)

problem_scenario:
  question: "에이전트가 무한루프 돌면서 비용 폭탄 나면?"
  case: "Claude Code 250,000 API 콜/일 사고 — 서킷브레이커 3줄로 해결"
  insight: "재시도(retry) = 같은 걸 다시. 서킷브레이커 = 3번 실패하면 아예 멈춤"

diagram_type: flowchart
diagram_title: "서킷브레이커 동작 흐름"
diagram_description: |
  정상 → 실패 1회 → 재시도 → 실패 2회 → 재시도 → 실패 3회 → 차단(Circuit Open)
  차단 상태에서 일정 시간 후 → 반개방(Half-Open) → 1회 시도 → 성공하면 정상 복귀

corthex_connection: |
  pg-boss 큐 + advisory lock 동시성 제어 + maxLoops:10 + 429/500 리트라이 있음.
  시스템 전체 서킷브레이커는 아직 없음.
  인간 승인: GATE 소통 규칙으로 존재 (CLAUDE.md)

concepts:
  - session-management
  - circuit-breaker
  - concurrency-control
  - human-approval

verdict: "서킷브레이커와 재시도의 차이를 사례로 설명 가능"
