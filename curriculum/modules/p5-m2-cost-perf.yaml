title: "비용과 성능 — 돈 아끼면서 빠르게"
phase: 5
module: 2
track: basic
duration: 25min
objective: "에이전트 운영 비용 구조와 최적화 방법을 이해한다"

key_concepts:
  - 토큰 예산 (Token Budget) — 작업당 쓸 수 있는 토큰 상한
  - KV-Cache — 반복되는 부분을 캐싱해서 비용/속도 개선
  - 도구 최적화 — 도구 줄이면 성능 오름 (Vercel: 15→2개, 80%→100% 정확도)
  - 모델 선택 전략 — Haiku(빠름/저렴) vs Sonnet(균형) vs Opus(깊은 사고)
  - 비용 = 입력토큰 + 출력토큰 — 입력이 더 싸고 출력이 더 비쌈

concept_pairs:
  - ["비용 (돈)", "성능 (속도/정확도)"]
  - ["큰 모델 (비싸지만 똑똑)", "작은 모델 (싸지만 가벼움)"]
  - ["도구 많음 (선택 부담↑)", "도구 적음 (집중↑)"]

problem_scenario:
  question: "에이전트 비용이 너무 비싸면?"
  case: "Manus: KV-cache로 토큰당 $3→$0.30 (10배 절감)"
  insight: "같은 일을 더 싸게 하는 게 하네스 엔지니어링"

concepts:
  - token-budget
  - kv-cache
  - tool-optimization
  - model-selection
  - cost-structure

verdict: "에이전트 비용을 줄이는 방법 3가지를 설명 가능"
