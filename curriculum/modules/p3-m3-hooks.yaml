title: "훅과 자동화 — 건너뛸 수 없는 규칙"
phase: 3
module: 3
track: basic
duration: 25min
objective: "훅이 뭔지, 스킬과 어떻게 다른지, 왜 훅이 더 확실한지 이해한다"

key_concepts:
  - 훅 (Hook) — 특정 시점에 자동 실행되는 코드 (모델이 건너뛸 수 없음)
  - 라이프사이클 이벤트 — PreToolUse, PostToolUse, SessionStart 등 22개+
  - 스킬 vs 훅 — 스킬=프롬프트(안 지킬 수 있음), 훅=코드(100% 실행)
  - 플러그인 (Plugin) — 스킬+훅을 묶어서 배포하는 패키지
  - 결정론적 실행 — 프롬프트에 의존하지 않고 인프라가 보장하는 실행
  - 스킬 frontmatter — 스킬 정의 필드 13개 (shanraisshan/claude-code-best-practice)
  - 사운드 훅 — 이벤트별 사운드 알림 (best-practice 레포 실습 예제)

reference_repos:
  - shanraisshan/claude-code-best-practice — 스킬 13필드 + 명령어 68개 + 훅 이벤트 카탈로그 (39.9K⭐)
  - affaan-m/everything-claude-code — 181 스킬 + 79 명령어 실전 예제 (153K⭐)

concept_pairs:
  - ["스킬 (프롬프트, 안 지킬 수 있음)", "훅 (코드, 100% 실행)"]
  - ["PreToolUse (실행 전 체크)", "PostToolUse (실행 후 체크)"]
  - ["플러그인 (배포 묶음)", "개별 스킬/훅"]

diagram_type: flowchart
diagram_title: "훅 실행 흐름"
diagram_description: |
  사용자 요청 → 모델 판단 → [PreToolUse 훅: 허락?]
  → 도구 실행 → [PostToolUse 훅: 포맷/린트]
  → 결과 반환

exercise:
  type: 구분
  description: |
    예시 훅 3종의 역할 추측:
      hooks/pre-tool-guard.sh  → PreToolUse 훅 (도구 실행 전 검증)
      hooks/loop-detector.js   → 안전 훅 (무한루프 방지)
      hooks/statusline.sh      → 관측 훅 (상태 표시)
    각각 어떤 라이프사이클 이벤트에 걸리는지 판별

concepts:
  - hook
  - lifecycle-event
  - skill-vs-hook
  - plugin
  - deterministic-execution

verdict: "훅과 스킬의 차이를 한 문장으로 설명 가능"
