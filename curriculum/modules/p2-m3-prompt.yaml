title: "프롬프트와 지시 — 어떻게 시키나"
phase: 2
module: 3
track: basic
duration: 25min
objective: "시스템 프롬프트, 사용자 프롬프트, 프롬프트 엔지니어링 기초를 이해한다"

key_concepts:
  - 시스템 프롬프트 (System Prompt) — 에이전트에게 주는 기본 지시 (사용자에게 안 보임)
  - 사용자 프롬프트 (User Prompt) — 사용자가 직접 입력하는 말
  - 프롬프트 엔지니어링 — 원하는 결과를 얻기 위해 지시를 잘 쓰는 기술
  - Few-shot — 예시를 몇 개 보여주고 패턴 따라하게 하기
  - Chain-of-Thought — "단계별로 생각해봐"라고 시키기

concept_pairs:
  - ["시스템 프롬프트 (기본 설정)", "사용자 프롬프트 (입력)"]
  - ["프롬프트 (지시)", "도구 (실행)"]
  - ["스킬 (프롬프트 기반)", "훅 (코드 기반)"]

exercise:
  type: 구분
  description: |
    CLAUDE.md 안의 내용 = 시스템 프롬프트의 일부
    동희님이 채팅에 치는 말 = 사용자 프롬프트
    /kdh-study 스킬 내용 = 시스템 프롬프트에 주입되는 지시

concepts:
  - system-prompt
  - user-prompt
  - prompt-engineering
  - few-shot
  - chain-of-thought

verdict: "시스템 프롬프트와 사용자 프롬프트의 차이를 설명 가능"
