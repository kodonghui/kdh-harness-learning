title: "실패 유형 + 경계 진단"
phase: 2
module: 1
track: basic
duration: 30min
objective: "에러를 보고 모델/프롬프트/하네스 중 어디 문제인지 구분한다"

key_concepts:
  - 실패 3경계 (모델 문제 / 프롬프트 문제 / 하네스 문제)
  - 실패 유형 분류 (타임아웃 / 루프 / 토큰 초과 / API 에러 / 크래시)

problem_scenario:
  question: "AI가 이상한 답을 했다 — 어디가 문제인가?"
  cases:
    - "모델 문제: 환각, 사실 오류 → 프롬프트나 하네스로는 해결 안 됨"
    - "프롬프트 문제: 지시가 모호해서 엉뚱한 결과 → 지시 수정으로 해결"
    - "하네스 문제: 도구 실패, 컨텍스트 손실, 큐 멈춤 → 하네스 수정으로 해결"

diagram_type: flowchart
diagram_title: "실패 판정 플로우차트"
diagram_description: |
  증상 확인 → "같은 질문을 다시 했을 때 같은 결과?"
  → Yes: 일관적 오류 → 프롬프트 or 하네스
  → No: 비일관적 → 모델 (확률적 문제)
  → 하네스 로그 확인 → 도구 에러? 타임아웃? 토큰 초과?

corthex_connection: |
  agent-engine의 에러 코드: RATE_LIMITED, SERVICE_UNAVAILABLE,
  EXECUTION_ERROR, STREAM_TIMEOUT, MAX_LOOPS_EXCEEDED

concepts:
  - failure-boundary
  - failure-taxonomy
  - error-diagnosis

verdict: "에러가 나왔을 때 3가지(모델/프롬프트/하네스) 중 어디 문제인지 판별 가능"
